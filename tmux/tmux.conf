set -g default-terminal "tmux-256color"
set -ag terminal-features ",ghostty:RGB"
set -ag terminal-features ",ghostty:extkeys"
set -g extended-keys on

bind r source-file ~/.tmux.conf \; display "Reloaded tmux config!"

unbind C-Space
set -g prefix C-Space
bind C-Space send-prefix
bind Space last-pane
bind w last-window
bind C-p previous-window
bind C-n next-window
bind R                                      \
    move-window -r\;                        \
    display-message "Windows reordered..."
# Focus modes: Off → Dim → Beacon (prefix+F cycles)
set -g @focus_mode 0
bind F run-shell "~/.tmux/scripts/focus-mode.sh"
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle
bind-key -T copy-mode-vi 'y' send -X copy-selection

# Mouse drag enters copy mode; release copies but keeps selection visible
bind -n MouseDrag1Pane if-shell -F "#{mouse_any_flag}" "send-keys -M" "copy-mode -M"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "pbcopy"
bind -T copy-mode    MouseDragEnd1Pane send-keys -X copy-pipe-no-clear "pbcopy"

set -g status-position top

set -g base-index 1
set -g renumber-windows on
set -g mouse on
set -g history-limit 50000
set -g display-time 2000
set -g status-interval 5
set -g focus-events on
setw -g aggressive-resize on
set -s escape-time 0

# Smart Ctrl+hjkl navigation — pass through to neovim if it's the active process,
# otherwise navigate tmux panes. Neovim handles the opposite direction (pane → nvim window).
is_vim="[ '#{pane_current_command}' = 'nvim' ]"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
# Also forward from copy-mode
bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R
# set -g detach-on-destroy off

# Title Terminal settings
set -g allow-passthrough on
set -g set-titles on
set -g set-titles-string "tmux #S - #{pane_title}"

set -g pane-border-status top
set -g pane-border-format "#{pane_index} #{pane_title}"

# Window renaming
setw -g automatic-rename on
set -g automatic-rename-format "#{pane_title}"
bind , command-prompt -I "#W" "rename-window '%%'; setw automatic-rename off"
bind < setw automatic-rename on \; display "Window's name reset"


# Configure Catppuccin — auto-detect via osascript (reliable in all environments)
# prefix+T manually toggles mocha/latte without needing to change macOS appearance
bind T run-shell "~/.tmux/scripts/toggle-theme.sh"
if-shell "[ \"$(~/.tmux/scripts/detect-theme.sh)\" = 'mocha' ]" \
  "set -g @catppuccin_flavor 'mocha'" \
  "set -g @catppuccin_flavor 'latte'"
set -g @catppuccin_status_background "#{@thm_bg}"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

# status left look and feel
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]  #S },#{#[bg=#{@thm_bg},fg=#{@thm_green},bold]  #S }}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_maroon}]  #{pane_current_command} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_yellow}]#{?window_zoomed_flag,  zoom ,}"

# status right look and feel
set -g status-right-length 100
set -g status-right ""
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_sky}] #{cpu_icon} #{cpu_percentage} "
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_mauve}] #{ram_icon} #{ram_percentage} "
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_blue}] 󰭦 %Y-%m-%d 󰅐 %H:%M"

set -g status-justify "absolute-centre"

# pane border look and feel
setw -g pane-active-border-style "bg=#{@thm_bg},fg=#{@thm_overlay_0}"
setw -g pane-border-style "bg=#{@thm_bg},fg=#{@thm_surface_0}"
setw -g pane-border-lines double

set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_rosewater}"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_peach}"
set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"

set -g window-status-current-style "bg=#{@thm_peach},fg=#{@thm_bg},bold"


run ~/.tmux/plugins/catppuccin/catppuccin.tmux
run-shell ~/.tmux/plugins/tmux-cpu/cpu.tmux
run-shell ~/.tmux/plugins/tmux-fzf-url/fzf-url.tmux

