bind r source-file ~/.tmux.conf \; display "Reloaded tmux config!"

unbind C-Space
set -g prefix C-Space
bind C-Space send-prefix
bind-key -T copy-mode-vi 'v' send -X begin-selection     # Begin selection in copy mode.
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle  # Begin selection in copy mode.
bind-key -T copy-mode-vi 'y' send -X copy-selection      # Yank selection in copy mode.

set -g mouse on
#set -g default-terminal "tmux-256color"
set -g history-limit 5000
set-option -g detach-on-destroy off

# Title Terminal settings
set -g allow-passthrough on
set -g set-titles on
set -g set-titles-string "tmux #S - #{pane_title}"

set -g pane-border-status top
set -g pane-border-format "#{pane_index} #{pane_title}"

# Window renaming
setw -g automatic-rename on
set -g automatic-rename-format "#{pane_title}"
bind , command-prompt -I "#W" "rename-window '%%'; set-window-option automatic-rename off"
bind < set-window-option automatic-rename on \; display "Window's name reset"


set -g @catppuccin_window_status_style "basic"
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"

run ~/.tmux/plugins/catppuccin/catppuccin.tmux
set -g status-bg default
set -g status-style bg=default

# Visualisation config
set -g status-right-length 100

run ~/.tmux/plugins/tmux-cpu/cpu.tmux
